<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup">
    <div id="display">159%</div>
    <div id="controls">
      <button class="step-btn" id="step-down" aria-label="Decrease volume">-</button>
      <input type="range" id="slider" min="0" max="200" value="159" aria-label="Volume">
      <button class="step-btn" id="step-up" aria-label="Increase volume">+</button>
    </div>
    <canvas id="vu-meter" width="200" height="28"></canvas>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
